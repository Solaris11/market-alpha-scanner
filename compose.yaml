name: market-alpha-scanner

services:
  market-alpha-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_alpha}
      POSTGRES_USER: ${POSTGRES_USER:-market_alpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_before_production}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /opt/apps/market-alpha-scanner/runtime/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-market_alpha} -d ${POSTGRES_DB:-market_alpha}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - market-alpha-scanner-private

  market-alpha-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      market-alpha-postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_alpha}
      POSTGRES_USER: ${POSTGRES_USER:-market_alpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_before_production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://market_alpha:change_me_before_production@market-alpha-postgres:5432/market_alpha}
      SCANNER_OUTPUT_DIR: ${SCANNER_OUTPUT_DIR:-/app/scanner_output}
      APP_LOG_DIR: ${APP_LOG_DIR:-/app/logs}
    command:
      [
        "streamlit",
        "run",
        "dashboard.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
    ports:
      - "${STREAMLIT_HOST_PORT:-18501}:8501"
    volumes:
      - /opt/apps/market-alpha-scanner/runtime/scanner_output:/app/scanner_output
      - /opt/apps/market-alpha-scanner/runtime/logs:/app/logs
    networks:
      - market-alpha-scanner-private

  market-alpha-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      market-alpha-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://market_alpha:change_me_before_production@market-alpha-postgres:5432/market_alpha}
    command:
      - "uvicorn"
      - "api.main:app"
      - "--host=0.0.0.0"
      - "--port=8000"
    ports:
      - "${API_HOST_PORT:-18000}:8000"
    networks:
      - market-alpha-scanner-private

  market-alpha-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: market-alpha-frontend
    restart: unless-stopped
    depends_on:
      market-alpha-postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3001"
      APP_URL: ${APP_URL:-https://app.marketalpha.co}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://app.marketalpha.co}
      DATABASE_URL: ${FRONTEND_DATABASE_URL:-postgresql://${POSTGRES_USER:-market_alpha}:${POSTGRES_PASSWORD:-change_me_before_production}@market-alpha-postgres:5432/${POSTGRES_DB:-market_alpha}}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SCANNER_OUTPUT_DIR: /app/scanner_output
      MARKET_ALPHA_ADMIN_EMAILS: ${MARKET_ALPHA_ADMIN_EMAILS:-}
      MARKET_ALPHA_PREMIUM_EMAILS: ${MARKET_ALPHA_PREMIUM_EMAILS:-}
      MARKET_ALPHA_MOCK_PREMIUM: ${MARKET_ALPHA_MOCK_PREMIUM:-false}
      MARKET_ALPHA_MAX_SCAN_AGE_MINUTES: ${MARKET_ALPHA_MAX_SCAN_AGE_MINUTES:-240}
      MARKET_ALPHA_ENABLE_DEV_LOGIN: ${MARKET_ALPHA_ENABLE_DEV_LOGIN:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    ports:
      - "3001:3001"
    volumes:
      - /opt/apps/market-alpha-scanner/runtime/scanner_output:/app/scanner_output
    networks:
      - market-alpha-scanner-private

networks:
  market-alpha-scanner-private:
    name: market-alpha-scanner-private
    driver: bridge

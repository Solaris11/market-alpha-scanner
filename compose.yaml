name: market-alpha-scanner

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  market-alpha-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_alpha}
      POSTGRES_USER: ${POSTGRES_USER:-market_alpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /opt/apps/market-alpha-scanner/runtime/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-market_alpha} -d ${POSTGRES_DB:-market_alpha}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - market-alpha-scanner-private

  market-alpha-app:
    profiles:
      - legacy-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *default-logging
    depends_on:
      market-alpha-postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_alpha}
      POSTGRES_USER: ${POSTGRES_USER:-market_alpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-market_alpha}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@market-alpha-postgres:5432/${POSTGRES_DB:-market_alpha}}
      SCANNER_OUTPUT_DIR: ${SCANNER_OUTPUT_DIR:-/app/scanner_output}
      APP_LOG_DIR: ${APP_LOG_DIR:-/app/logs}
    command:
      [
        "streamlit",
        "run",
        "dashboard.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
      ]
    expose:
      - "8501"
    volumes:
      - /opt/apps/market-alpha-scanner/runtime/scanner_output:/app/scanner_output:ro
      - /opt/apps/market-alpha-scanner/runtime/logs:/app/logs
    networks:
      - market-alpha-scanner-private

  market-alpha-api:
    profiles:
      - legacy-python-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *default-logging
    depends_on:
      market-alpha-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-market_alpha}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@market-alpha-postgres:5432/${POSTGRES_DB:-market_alpha}}
    command:
      - "uvicorn"
      - "api.main:app"
      - "--host=0.0.0.0"
      - "--port=8000"
    expose:
      - "8000"
    networks:
      - market-alpha-scanner-private

  market-alpha-scanner-job:
    profiles:
      - scanner-job
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "${SCANNER_RUN_UID:-1000}:${SCANNER_RUN_GID:-1000}"
    logging: *default-logging
    depends_on:
      market-alpha-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${SCANNER_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-market_alpha}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@market-alpha-postgres:5432/${POSTGRES_DB:-market_alpha}}
      SCANNER_OUTPUT_DIR: /app/scanner_output
      APP_LOG_DIR: /app/logs
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-yfinance}
      MARKET_DATA_FALLBACK: ${MARKET_DATA_FALLBACK:-yfinance}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_DATA_BASE_URL: ${ALPACA_DATA_BASE_URL:-https://data.alpaca.markets}
      ALPACA_DATA_FEED: ${ALPACA_DATA_FEED:-iex}
    command:
      [
        "python",
        "investment_scanner_mvp.py",
        "--fast",
        "--timing",
        "--outdir",
        "/app/scanner_output",
      ]
    volumes:
      - /opt/apps/market-alpha-scanner/runtime/scanner_output:/app/scanner_output
      - /opt/apps/market-alpha-scanner/runtime/logs:/app/logs
    networks:
      - market-alpha-scanner-private

  market-alpha-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: market-alpha-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch(\'http://127.0.0.1:3001/api/health\').then(async (r)=>{if(!r.ok) process.exit(1); const body = await r.json(); process.exit(body && body.ok ? 0 : 1);}).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      market-alpha-postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3001"
      APP_URL: ${APP_URL:-https://tradeveto.com}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://tradeveto.com}
      TRADEVETO_REDIRECT_ENABLED: ${TRADEVETO_REDIRECT_ENABLED:-false}
      DATABASE_URL: ${FRONTEND_DATABASE_URL:-postgresql://${POSTGRES_USER:-market_alpha}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@market-alpha-postgres:5432/${POSTGRES_DB:-market_alpha}}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@tradeveto.com}
      BILLING_EMAIL: ${BILLING_EMAIL:-billing@tradeveto.com}
      MARKET_ALPHA_ALERT_EMAIL_TO: ${MARKET_ALPHA_ALERT_EMAIL_TO:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      MARKET_ALPHA_ALERT_TELEGRAM_CHAT_ID: ${MARKET_ALPHA_ALERT_TELEGRAM_CHAT_ID:-}
      SCANNER_OUTPUT_DIR: /app/scanner_output
      SCANNER_CSV_FALLBACK: ${SCANNER_CSV_FALLBACK:-false}
      MARKET_ALPHA_ADMIN_EMAILS: ${MARKET_ALPHA_ADMIN_EMAILS:-}
      MARKET_ALPHA_PREMIUM_EMAILS: ${MARKET_ALPHA_PREMIUM_EMAILS:-}
      MARKET_ALPHA_DEV_PREMIUM_EMAILS: ${MARKET_ALPHA_DEV_PREMIUM_EMAILS:-}
      MARKET_ALPHA_MOCK_PREMIUM: ${MARKET_ALPHA_MOCK_PREMIUM:-false}
      MARKET_ALPHA_SESSION_SECRET: ${MARKET_ALPHA_SESSION_SECRET:-}
      MARKET_ALPHA_MONITORING_TOKEN: ${MARKET_ALPHA_MONITORING_TOKEN:-}
      MARKET_ALPHA_MAX_SCAN_AGE_MINUTES: ${MARKET_ALPHA_MAX_SCAN_AGE_MINUTES:-240}
      MARKET_ALPHA_BACKUP_DIR: /app/backups
      MARKET_ALPHA_ENABLE_DEV_LOGIN: ${MARKET_ALPHA_ENABLE_DEV_LOGIN:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      APP_BASE_URL: ${APP_BASE_URL:-https://tradeveto.com}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-0}
    expose:
      - "3001"
    volumes:
      - /opt/apps/market-alpha-scanner/runtime/scanner_output:/app/scanner_output:ro
      - /opt/backups/market-alpha:/app/backups:ro
    networks:
      - market-alpha-scanner-private
      - public-edge

networks:
  market-alpha-scanner-private:
    name: market-alpha-scanner-private
    driver: bridge
  public-edge:
    external: true
    name: public-edge
